name: YouTube Live 13h58

on:
  schedule:
    - cron: "58 6 * * *"
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest

    steps:
      - name: Install FFmpeg
        run: |
          sudo apt update
          sudo apt install ffmpeg -y

      - name: Start Stream
        run: |
          ffmpeg -re -i "https://live.fptplay53.net/live/media/VTV_can_tho/live_hls_avc/index.m3u8" -t 1800 -c copy -f flv rtmp://a.rtmp.youtube.com/live2/py7u-ewjm-36b0-auuj-51ea
